    <script>
      // Inyectamos dinámicamente el manifest de la PWA solo si no estamos en un portal de cliente.
      // Esto evita que navegadores móviles (como Safari en iOS) detecten el manifiesto en el HTML estático
      // de los portales de clientes y fuercen a que "Añadir a pantalla de inicio" apunte a la raíz (/)
      // instalando la app completa. Para los portales de cliente, creará un marcador web estándar directo a la URL.
      if (!window.location.pathname.includes('/portal/')) {
        var link = document.createElement('link');
        link.rel = 'manifest';
        link.href = '/manifest.json';
        document.head.appendChild(link);
      } else {
        // En portales públicos también forzamos a que no use modo standalone de Apple,
        // asegurando que se comporte como un marcador directo de navegador tradicional.
        var appleCapable = document.querySelector('meta[name="apple-mobile-web-app-capable"]');
        if (appleCapable) appleCapable.content = 'no';
      }
    </script>

      #splash-screen {

      .splash-text {

        letter-spacing: -0.01em;

      @keyframes splash-pulse {

        50% { transform: scale(1.05); filter: brightness(1.2); }
      }
      body.loaded #splash-screen {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
    </style>

    <div id="splash-screen" aria-hidden="true">

    <script>
      // Sistema de diagnóstico de carga RyB
      var hasAppMounted = false;
      
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        if (hasAppMounted) return false;
        var splash = document.getElementById('splash-screen');
        if (splash) {
          splash.style.backgroundColor = '#7f1d1d';
          var text = splash.querySelector('.splash-text');
          if (text) {
            text.innerHTML = `
              <div style="color:white; font-weight:bold; margin-bottom:10px;">Error Crítico</div>
              <small style="font-size:0.75rem; opacity:0.8; display:block; margin-bottom:20px;">${msg}</small>
              <div style="display:flex; flex-direction:column; gap:10px;">
                <button onclick="location.reload()" style="background:white; color:black; border:none; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer;">🔄 Reintentar</button>
                <button onclick="clearAppCache()" style="background:rgba(255,255,255,0.2); color:white; border:1px solid white; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer;">🧹 Limpiar Caché</button>
              </div>
            `;
          }
        }
        return false;
      };

      function clearAppCache() {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) { registration.unregister(); }
          });
        }
        caches.keys().then(function(names) {
          for (let name of names) caches.delete(name);
        });
        localStorage.clear();
        sessionStorage.clear();
        location.reload();
      }

      // Tiempo máximo de espera para el Splash (Aumentado a 8s para dar tiempo a React)
      var forceLoadTimeout = setTimeout(function() {
        if (!hasAppMounted) {
          console.warn('Splash timeout: forcing app visibility');
          document.body.classList.add('loaded');
        }
      }, 8000);

      window.addEventListener('app-mounted', function() {
        hasAppMounted = true;
        clearTimeout(forceLoadTimeout);
        document.body.classList.add('loaded');
      });
    </script>
