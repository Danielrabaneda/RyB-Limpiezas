<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="RyB Limpiezas - Sistema de gestión de servicios de limpieza" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RyB Limpiezas" />
    
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    
    <!-- DNS Prefetch & Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://firestore.googleapis.com">
    <link rel="preconnect" href="https://firebasestorage.googleapis.com">
    <link rel="dns-prefetch" href="https://firestore.googleapis.com">
    <link rel="dns-prefetch" href="https://firebasestorage.googleapis.com">

    <title>RyB Limpiezas</title>
    
    <style>
      #splash-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #0f172a;
        z-index: 9999;
        transition: opacity 0.4s ease-out, visibility 0.4s;
      }
      .splash-logo {
        width: 90px;
        height: 90px;
        background: linear-gradient(135deg, #2563eb, #06b6d4);
        border-radius: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.8rem;
        font-weight: 800;
        color: white;
        margin-bottom: 1.5rem;
        box-shadow: 0 0 50px rgba(37, 99, 235, 0.4);
        animation: splash-pulse 2s infinite ease-in-out;
      }
      .splash-text {
        color: rgba(255,255,255,0.9);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 1.1rem;
        font-weight: 600;
        letter-spacing: -0.01em;
        text-align: center;
        padding: 0 20px;
      }
      @keyframes splash-pulse {
        0%, 100__% { transform: scale(1); filter: brightness(1); }
        50% { transform: scale(1.05); filter: brightness(1.2); }
      }
      body.loaded #splash-screen {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="splash-screen" aria-hidden="true">
      <div class="splash-logo">RyB</div>
      <div class="splash-text">Iniciando aplicación...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Sistema de diagnóstico de carga RyB
      var hasAppMounted = false;
      
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        if (hasAppMounted) return false;
        var splash = document.getElementById('splash-screen');
        if (splash) {
          splash.style.backgroundColor = '#7f1d1d';
          var text = splash.querySelector('.splash-text');
          if (text) {
            text.innerHTML = `
              <div style="color:white; font-weight:bold; margin-bottom:10px;">Error Crítico</div>
              <small style="font-size:0.75rem; opacity:0.8; display:block; margin-bottom:20px;">${msg}</small>
              <div style="display:flex; flex-direction:column; gap:10px;">
                <button onclick="location.reload()" style="background:white; color:black; border:none; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer;">🔄 Reintentar</button>
                <button onclick="clearAppCache()" style="background:rgba(255,255,255,0.2); color:white; border:1px solid white; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer;">🧹 Limpiar Caché</button>
              </div>
            `;
          }
        }
        return false;
      };

      function clearAppCache() {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) { registration.unregister(); }
          });
        }
        caches.keys().then(function(names) {
          for (let name of names) caches.delete(name);
        });
        localStorage.clear();
        sessionStorage.clear();
        location.reload();
      }

      // Tiempo máximo de espera para el Splash (Aumentado a 8s para dar tiempo a React)
      var forceLoadTimeout = setTimeout(function() {
        if (!hasAppMounted) {
          console.warn('Splash timeout: forcing app visibility');
          document.body.classList.add('loaded');
        }
      }, 8000);

      window.addEventListener('app-mounted', function() {
        hasAppMounted = true;
        clearTimeout(forceLoadTimeout);
        document.body.classList.add('loaded');
      });
    </script>
  </body>
</html>
